server:
  port: 8080

spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/movie_recommender?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

algorithm:
  service:
    base-url: ${ALGORITHM_SERVICE_URL:http://localhost:8000}

llm:
  api:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o-mini}
