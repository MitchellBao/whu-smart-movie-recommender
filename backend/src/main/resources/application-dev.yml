spring:
  datasource:
    url: jdbc:h2:mem:movie_recommender;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

algorithm:
  service:
    base-url: ${ALGORITHM_SERVICE_URL:http://localhost:8000}

llm:
  api:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:gpt-4o-mini}
